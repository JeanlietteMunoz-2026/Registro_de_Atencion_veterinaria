<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Mascotas</title>
  <style>
    :root {
      --azul: #2563eb;
      --azul-oscuro: #1d4ed8;
      --verde: #16a34a;
      --gris: #64748b;
      --fondo: linear-gradient(135deg, #f8fbff 0%, #eef4ff 100%);
      --blanco: #ffffff;
      --borde: #dbeafe;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--fondo);
      margin: 0;
      padding: 24px;
      color: #0f172a;
    }

    .contenedor {
      max-width: 1050px;
      margin: 0 auto;
      background: var(--blanco);
      padding: 28px;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.13);
    }

    h1, h2 {
      color: var(--azul-oscuro);
      margin-bottom: 12px;
    }

    form {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 600;
    }

    input, select, button {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--borde);
      font-size: 14px;
    }

    input:focus, select:focus {
      outline: 2px solid rgba(37, 99, 235, 0.2);
      border-color: var(--azul);
    }

    button {
      cursor: pointer;
      background: linear-gradient(135deg, var(--azul) 0%, var(--azul-oscuro) 100%);
      color: #fff;
      border: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(37, 99, 235, 0.25);
    }

    .mensaje {
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fee2e2;
      color: #b91c1c;
    }

    .mensaje.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .grupo-busqueda,
    .filtro-banner,
    .estadisticas {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filtro-btn {
      background: #e2e8f0;
      color: #0f172a;
      box-shadow: none;
    }

    .filtro-btn.activo {
      background: linear-gradient(135deg, var(--azul) 0%, var(--azul-oscuro) 100%);
      color: #fff;
    }

    .card {
      background: linear-gradient(135deg, #f8fbff 0%, #eef4ff 100%);
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--borde);
      min-width: 220px;
    }

    .resultado-busqueda,
    .lista-mascotas {
      display: grid;
      gap: 12px;
    }

    .mascota,
    .ficha-edicion {
      border: 1px solid var(--borde);
      border-radius: 14px;
      padding: 16px;
      background: var(--blanco);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
    }

    .mascota.atendido {
      border-color: #86efac;
      background: #f0fdf4;
    }

    .estado {
      font-weight: bold;
      color: var(--verde);
    }

    .acciones {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .acciones a {
      text-decoration: none;
    }

    footer {
      margin-top: 24px;
      text-align: center;
      color: var(--gris);
      font-size: 14px;
    }

    footer .acciones {
      margin-top: 12px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <main class="contenedor">
    <h1>Registro de Mascotas</h1>

    <form id="formMascota">
      <label for="nombreMascota">Nombre de la mascota
        <input type="text" id="nombreMascota" placeholder="Ej. Luna">
      </label>

      <label for="especieMascota">Especie
        <input type="text" id="especieMascota" placeholder="Ej. Perro">
      </label>

      <label for="propietarioMascota">Nombre del propietario
        <input type="text" id="propietarioMascota" placeholder="Ej. María Soto">
      </label>

      <label for="edadMascota">Edad
        <input type="number" id="edadMascota" placeholder="Ej. 4">
      </label>

      <label for="estadoMascota">Estado
        <select id="estadoMascota">
          <option value="Pendiente">Pendiente</option>
          <option value="En Atención">En Atención</option>
          <option value="De Alta">De Alta</option>
        </select>
      </label>

      <button type="button" id="btnRegistrar">Registrar</button>
    </form>

    <p id="mensajeValidacion" class="mensaje"></p>

    <section>
      <h2>Buscar mascota</h2>
      <div class="grupo-busqueda">
        <input type="text" id="buscarMascota" placeholder="Escribe el nombre de la mascota">
        <button type="button" id="btnBuscar">Buscar</button>
      </div>
      <div id="resultadoBusqueda" class="resultado-busqueda"></div>
    </section>

    <section>
      <h2>Filtrar por estado</h2>
      <div class="filtro-banner">
        <button type="button" class="filtro-btn activo" data-filtro="Todos">Todos</button>
        <button type="button" class="filtro-btn" data-filtro="Pendiente">Pendiente</button>
        <button type="button" class="filtro-btn" data-filtro="En Atención">En Atención</button>
        <button type="button" class="filtro-btn" data-filtro="De Alta">De Alta</button>
      </div>
      <div id="mensajeFiltro" class="mensaje"></div>
    </section>

    <section>
      <h2>Pacientes registrados y estadísticas</h2>
      <div class="estadisticas">
        <div class="card" id="totalMascotas">Total de mascotas registradas: 0</div>
        <div class="card" id="mascotasPendientes">Mascotas pendientes: 0</div>
        <div class="card" id="mascotasAtendidas">Mascotas atendidas: 0</div>
      </div>
      <div id="listaMascotas" class="lista-mascotas"></div>
    </section>
  </main>

  <footer>
    <p>2026 JeanMun. Todos los derechos reservados.</p>
    <div class="acciones">
      <a href="https://github.com/JeanlietteMunoz-2026/Registro_de_Atencion_veterinaria.git" target="_blank" rel="noopener noreferrer"><button type="button">GitHub</button></a>
      <a href="https://wa.me/+56982071360" target="_blank" rel="noopener noreferrer"><button type="button">WhatsApp</button></a>
    </div>
  </footer>

  <script src="script2.js"></script>
</body>
</html>
