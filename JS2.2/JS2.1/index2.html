<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registro de Productos</title>
</head>
<body>
	<!-- Encabezado principal del módulo de inventario -->
	<h1>Registro de Productos</h1>

	<!-- Formulario básico para capturar datos del producto -->
	<input type="text" id="nombreProducto" placeholder="Nombre del producto">
	<input type="number" id="precioProducto" placeholder="Precio">
	<input type="number" id="cantidadProducto" placeholder="Cantidad">

	<!-- Botón para agregar el producto a la lista en memoria -->
	<button id="btnAgregar">Agregar producto</button>

	<!-- Mensajes de validación/confirmación mostrados por JavaScript -->
	<p id="mensaje"></p>

	<!-- Sección visual del inventario registrado -->
	<h2>Inventario</h2>
	<ul id="listaProductos"></ul>

	<!-- Total acumulado del inventario (precio * cantidad) -->
	<h3 id="totalInventario">Total inventario: $0</h3>

	<!-- Lógica de inventario y eventos de la interfaz -->
	<script src="script2.js"></script>
</body>
</html>
